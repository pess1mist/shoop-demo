server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shuju?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: finance
    password: Finance@2024!Demo
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 3
      maximum-pool-size: 20
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.example.finance.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.finance: WARN
    root: WARN

jwt:
  secret: ${JWT_SECRET:ProdSecret_Finance2024_ShoopDemo_JWT!}
  expiration: ${JWT_EXPIRATION:86400000}
  header: ${JWT_HEADER:Authorization}
  prefix: ${JWT_PREFIX:Bearer }

schedule:
  data-collection: 0 0/30 * * * ?
  budget-check: 0 0/15 * * * ?
  trend-prediction: 0 0 2 * * ?
